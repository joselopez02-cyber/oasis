spring.application.name=oasis-cinema-v2

# --- CONFIGURACIÓN DE PERSISTENCIA REAL ---
# Al usar ./ el archivo se guarda en /app, que es tu volumen persistente
spring.datasource.url=jdbc:h2:file:./oasis_db;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- CONSOLA H2 ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- CONFIGURACIÓN DE TABLAS Y SWAGGER ---
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}
springdoc.swagger-ui.path=/swagger-ui.html