spring.application.name=oasis-cinema-v2

# --- CONFIGURACIÓN DE PERSISTENCIA ---
# Usamos la ruta absoluta /data para que coincida con el volumen de Railway
spring.datasource.url=jdbc:h2:file:/data/oasis_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- CONSOLA H2 ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Esto permite que entres desde tu navegador a la nube
spring.h2.console.settings.web-allow-others=true

# --- TABLAS Y SWAGGER ---
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}
springdoc.swagger-ui.path=/swagger-ui.html